services:
  consul:
    image: consul:1.15.4
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8500/v1/status/leader"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: industrial_fault_tree_ai
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123456"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.2
    command:
      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - redis123456
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  etcd:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/quay.io/coreos/etcd:v3.5.5
    environment:
      ETCDCTL_API: "3"
    command:
      - /usr/local/bin/etcd
      - --name
      - etcd
      - --data-dir
      - /etcd-data
      - --advertise-client-urls
      - http://etcd:2379
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --initial-advertise-peer-urls
      - http://etcd:2380
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-cluster
      - etcd=http://etcd:2380
      - --initial-cluster-state
      - new
      - --initial-cluster-token
      - etcd-cluster-1
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD-SHELL", "etcdctl --endpoints=http://127.0.0.1:2379 endpoint health"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    command: minio server /minio_data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  milvus-standalone:
    image: milvusdb/milvus:v2.5.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14269:14269"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"

  user:
    build:
      context: .
      dockerfile: docker_files/DockerFile.user
    ports:
      - "8888:8888"
    environment:
      GO_ENV: online
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      MYSQL_DATABASE: industrial_fault_tree_ai
      MYSQL_HOST: mysql
      REDIS_PASSWORD: redis123456
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  graph:
    build:
      context: .
      dockerfile: docker_files/DockerFile.graph
    ports:
      - "8890:8890"
    volumes:
      - ./volumes/graph:/graph
    environment:
      GO_ENV: online
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      MYSQL_DATABASE: industrial_fault_tree_ai
      MYSQL_HOST: mysql
      REDIS_PASSWORD: redis123456
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  ai:
    build:
      context: .
      dockerfile: docker_files/DockerFile.ai
    ports:
      - "8891:8891"
    volumes:
      - ./volumes/graph:/graph
    environment:
      - GO_ENV=online
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root123456
      - MYSQL_DATABASE=industrial_fault_tree_ai
      - MYSQL_HOST=mysql
      - REDIS_PASSWORD=redis123456
      - GRAPH_ROOT_DIR=/graph
      - MODEL_NAME=qwen3-max
      - MODEL_MAX_TOKENS=30000
      - MODEL_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - MODEL_ENABLE_THINKING=false
      - MODEL_TEMPERATURE=0.2
      - MODEL_TOP_P=0.8
      - DASHSCOPE_API_KEY
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      graph:
        condition: service_started

  document:
    build:
      context: .
      dockerfile: docker_files/DockerFile.document
    ports:
      - "8892:8892"
    volumes:
      - ./volumes/document:/document
    environment:
      - GO_ENV=online
      - EMBEDDING_API_KEY
      - DASHSCOPE_API_KEY
      - MILVUS_PASSWORD
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      consul:
        condition: service_healthy
      milvus-standalone:
        condition: service_started
      jaeger:
        condition: service_started

  bff:
    build:
      context: .
      dockerfile: docker_files/DockerFile.bff
    ports:
      - "8082:8080"
    volumes:
      - ./volumes/graph:/graph
      - ./volumes/document:/document
      - ./volumes/static:/static
    environment:
      GO_ENV: online
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      MYSQL_DATABASE: industrial_fault_tree_ai
      MYSQL_HOST: mysql
      REDIS_PASSWORD: redis123456
      SESSION_SECRET: industrial-fault-tree-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      user:
        condition: service_started
      graph:
        condition: service_started
      ai:
        condition: service_started
      document:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker_files/DockerFile.frontend
      args:
        VITE_DEPLOY_DOMAIN: http://124.221.120.118:8080
        VITE_API_BASE_URL: /api
    ports:
      - "80:80"
    depends_on:
      bff:
        condition: service_started

volumes:
  mysql_data: {}
  redis_data: {}
  consul_data: {}
  etcd_data: {}
  minio_data: {}
  milvus_data: {}
  prometheus_data: {}
  grafana_data: {}
