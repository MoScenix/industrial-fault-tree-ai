syntax = "proto3";

package document;

option go_package = "document";

enum OwnerType {
  OWNER_TYPE_UNSPECIFIED = 0;
  PERSONAL = 1;
  PROJECT = 2;
}

enum ParseStatus {
  PARSE_STATUS_UNSPECIFIED = 0;
  SUCCESS = 1;
  FAILED = 2;
}

message ParsePersonalPDFReq {
  string user_id = 1;
  string pdf_id = 2;
  string file_name = 3;
  string display_name = 4;
}

message ParseProjectPDFReq {
  string project_id = 1;
  string pdf_id = 2;
  string file_name = 3;
  string display_name = 4;
}

message ParsePDFResp {
  bool success = 1;
  string document_id = 2;
  string error_message = 3;
}

message GetDocumentReq {
  string document_id = 1;
}

message ListDocumentsReq {
  OwnerType owner_type = 1;
  string owner_id = 2;
  int64 page = 3;
  int64 page_size = 4;
}

message SearchDocumentsReq {
  string user_id = 1;
  string project_id = 2;
  string query = 3;
  int64 top_k = 4;
}

message DocumentChunk {
  string chunk_id = 1;
  string text = 2;
  int64 page = 3;
  int64 order = 4;
}

message Document {
  string document_id = 1;
  OwnerType owner_type = 2;
  string owner_id = 3;
  string pdf_id = 4;
  string file_name = 5;
  string display_name = 6;
  ParseStatus parse_status = 7;
  string summary = 8;
  repeated DocumentChunk chunks = 9;
  string created_at = 10;
  string updated_at = 11;
}

message GetDocumentResp {
  Document document = 1;
}

message ListDocumentsResp {
  repeated Document documents = 1;
  int64 total = 2;
}

message SearchResult {
  string document_id = 1;
  string document_name = 2;
  string chunk_id = 3;
  string text = 4;
  double score = 5;
}

message SearchDocumentsResp {
  repeated SearchResult results = 1;
}

service DocumentService {
  rpc ParsePersonalPDF(ParsePersonalPDFReq) returns (ParsePDFResp);
  rpc ParseProjectPDF(ParseProjectPDFReq) returns (ParsePDFResp);
  rpc GetDocument(GetDocumentReq) returns (GetDocumentResp);
  rpc ListDocuments(ListDocumentsReq) returns (ListDocumentsResp);
  rpc SearchDocuments(SearchDocumentsReq) returns (SearchDocumentsResp);
}
