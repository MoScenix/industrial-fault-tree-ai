kitex:
  service: "document"
  address: ":8892"
  log_level: info
  log_file_name: "log/kitex.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50
  metrics_port: ":9997"

registry:
  registry_address:
    - 127.0.0.1:8500
  username: ""
  password: "%s"

milvus:
  address: "127.0.0.1:19530"
  username: "root"
  password: "%s"
  database: "default"
  collection_name: "document_chunks"

embedding:
  provider: "openai"
  model: "text-embedding-v4"
  api_key: "%s"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  dimension: 1024
  top_k: 5

document:
  pdf_dir: "/document"
