hertz:
  service: "bff"
  address: ":8080"
  metrics_port: ":9998"
  enable_pprof: false
  enable_gzip: true
  enable_access_log: true
  log_level: info
  log_file_name: "log/hertz.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50

mysql:
  dsn: "%s:%s@tcp(%s:3306)/%s?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  address: "redis:6379"
  username: ""
  password: "%s"
  db: 0
consul:
  address: "consul:8500"
